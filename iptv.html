<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My IPTV Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    body { 
      font-family: 'Roboto', sans-serif; 
      background: #0a0a0a; 
      color: #fff; 
      margin: 0; 
      padding: 0; 
    }
    header {
      background: linear-gradient(90deg, #00b4d8, #0077b6);
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .tabs {
      display: flex;
      background: #111;
      overflow-x: auto;
      padding: 10px;
      gap: 10px;
    }
    .tab {
      padding: 10px 20px;
      background: #222;
      border-radius: 30px;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.active { background: #00b4d8; color: black; font-weight: bold; }
    
    ul { list-style: none; padding: 0; margin: 10px; }
    li { 
      padding: 16px; 
      background: #1f1f1f; 
      margin: 8px 0; 
      border-radius: 12px; 
      cursor: pointer;
    }
    video { 
      width: 100%; 
      background: #000; 
      margin-top: 10px;
    }
    .status { 
      padding: 12px; 
      text-align: center; 
      background: #222; 
      margin: 10px; 
      border-radius: 8px; 
    }
  </style>
</head>
<body>
  <header>My IPTV Player</header>

  <div class="tabs">
    <div class="tab active" onclick="filterCategory('all')">All</div>
    <div class="tab" onclick="filterCategory('cricket')">Cricket</div>
    <div class="tab" onclick="filterCategory('football')">Football</div>
    <div class="tab" onclick="filterCategory('wrestling')">Wrestling</div>
    <div class="tab" onclick="filterCategory('others')">Others</div>
  </div>

  <input type="text" id="search" placeholder="Search..." style="width:90%; margin:10px; padding:12px;" onkeyup="searchChannels()">

  <div id="status" class="status">Loading channels...</div>
  <ul id="channelList"></ul>
  <video id="player" controls></video>

  <script>
    let allChannels = [];

    const playlists = [
      {name: "World IPTV", url: "https://romaxa55.github.io/world_ip_tv/output/index.m3u"},
      {name: "All Channels", url: "https://iptv-org.github.io/iptv/index.m3u"}
    ];

    async function loadPlaylists() {
      const status = document.getElementById('status');
      allChannels = [];
      
      for (let pl of playlists) {
        try {
          const res = await fetch(pl.url);
          const text = await res.text();
          const lines = text.split('\n');
          let name = '';

          for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
              name = line.split(',').pop().trim();
            } else if (line.startsWith('http') && name) {
              allChannels.push({name, url: line, category: detectCategory(name)});
              name = '';
            }
          }
        } catch(e) {}
      }

      status.textContent = `${allChannels.length} channels loaded. Tap any to play.`;
      renderChannels(allChannels);
    }

    function detectCategory(name) {
      const n = name.toLowerCase();
      if (n.includes('cricket') || n.includes('ipl') || n.includes('t20')) return 'cricket';
      if (n.includes('football') || n.includes('fifa')) return 'football';
      if (n.includes('wwe') || n.includes('aew') || n.includes('wrestling')) return 'wrestling';
      return 'others';
    }

    function renderChannels(channels) {
      const list = document.getElementById('channelList');
      list.innerHTML = '';
      channels.forEach(ch => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${ch.name}</strong>`;
        li.onclick = () => playChannel(ch.url, ch.name);
        list.appendChild(li);
      });
    }

    function filterCategory(cat) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      const filtered = cat === 'all' ? allChannels : allChannels.filter(ch => ch.category === cat);
      renderChannels(filtered.length ? filtered : allChannels);
    }

    function searchChannels() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(term));
      renderChannels(filtered);
    }

    function playChannel(url, name) {
      const player = document.getElementById('player');
      const status = document.getElementById('status');
      
      status.textContent = `▶ Playing: ${name}`;
      player.src = url;
      
      player.play().then(() => {
        console.log("Playing");
      }).catch(err => {
        status.textContent = "❌ Cannot play. Try another channel (many links dead).";
        console.log(err);
      });
    }

    window.onload = loadPlaylists;
  </script>
</body>
</html>
