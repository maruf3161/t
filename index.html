<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strong IPTV Player</title>
  <style>
    body { font-family: Arial; background: #0f0f0f; color: #fff; margin: 0; padding: 10px; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; border-radius: 8px; }
    button { background: #e91e63; border: none; color: white; font-weight: bold; }
    ul { list-style: none; padding: 0; }
    li { padding: 14px; background: #1f1f1f; margin: 6px 0; border-radius: 8px; }
    video { width: 100%; background: black; margin-top: 10px; }
    .good { color: #4caf50; }
  </style>
</head>
<body>
  <h2>💪 Strong IPTV Player</h2>

  <select id="playlistSelect">
    <option value="https://iptv-org.github.io/iptv/index.m3u">All Channels (Free)</option>
    <option value="https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8">Free TV Playlist</option>
    <option value="https://romaxa55.github.io/world_ip_tv/output/index.m3u">World IPTV (Updated Daily)</option>
  </select>

  <input type="text" id="customUrl" placeholder="Or paste your own M3U URL">
  <button onclick="loadCustom()">Load Custom</button>
  <button onclick="loadSelected()">Load Selected Playlist</button>

  <div id="status"></div>
  <ul id="channelList"></ul>
  <video id="player" controls autoplay></video>

  <script>
    let channels = [];

    async function loadPlaylist(url) {
      const status = document.getElementById('status');
      const list = document.getElementById('channelList');
      status.innerHTML = 'Loading channels... Please wait';
      list.innerHTML = '';

      try {
        const response = await fetch(url);
        const text = await response.text();
        const lines = text.split('\n');
        
        channels = [];
        let currentName = '';

        for (let line of lines) {
          line = line.trim();
          if (line.startsWith('#EXTINF:')) {
            currentName = line.split(',').pop().trim();
          } else if (line.startsWith('http') && currentName) {
            channels.push({name: currentName, url: line});
            currentName = '';
          }
        }

        channels.forEach(ch => {
          const li = document.createElement('li');
          li.textContent = ch.name;
          li.onclick = () => play(ch.url);
          list.appendChild(li);
        });

        status.innerHTML = `<span class="good">${channels.length} channels loaded</span>`;
      } catch (e) {
        status.textContent = 'Failed to load. Try another playlist.';
      }
    }

    function loadSelected() {
      const url = document.getElementById('playlistSelect').value;
      loadPlaylist(url);
    }

    function loadCustom() {
      const url = document.getElementById('customUrl').value.trim();
      if (url) loadPlaylist(url);
    }

    function play(url) {
      const player = document.getElementById('player');
      player.src = url;
      player.play().catch(() => alert("Buffering or link dead. Try another channel."));
    }

    // Load default on start
    window.onload = loadSelected;
  </script>
</body>
</html>
